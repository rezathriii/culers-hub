services:
  rss-bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LLM_BASE_URL: http://host.docker.internal:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot-data:/data
      - ./feeds.yaml:/app/feeds.yaml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
    driver: local
